spring.application.name=order-monolith

# --- PostgreSQL connection ---
# Adjust host/port/db name/credentials to match your local Postgres
# (e.g. docker run -p 5432:5432 -e POSTGRES_PASSWORD=postgres postgres:16)
spring.datasource.url=jdbc:postgresql://localhost:5432/orderdb
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
# update is fine for local dev on a project like this; a real service
# would use Flyway/Liquibase migrations instead.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Fail fast instead of hanging forever if a row lock can't be acquired
spring.jpa.properties.jakarta.persistence.lock.timeout=5000

server.port=8080

# Let Hibernate create the schema first, then run data.sql to seed it
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
